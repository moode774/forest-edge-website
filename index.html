<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Edge | Engineering Luxury Furniture</title>
  <meta name="description"
    content="Forest Edge - Redefining furniture manufacturing with precision engineering and timeless design. Premium custom furniture for residential and commercial spaces." />
  <meta name="keywords"
    content="luxury furniture, custom furniture, wood furniture, office furniture, residential furniture, commercial furniture, Forest Edge" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://forestedge.com/" />
  <meta property="og:title" content="Forest Edge | Engineering Luxury Furniture" />
  <meta property="og:description"
    content="Redefining furniture manufacturing with precision engineering and timeless design." />
  <meta property="og:image" content="https://i.imgur.com/Cp8AbcG.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://forestedge.com/" />
  <meta property="twitter:title" content="Forest Edge | Engineering Luxury Furniture" />
  <meta property="twitter:description"
    content="Redefining furniture manufacturing with precision engineering and timeless design." />
  <meta property="twitter:image" content="https://i.imgur.com/Cp8AbcG.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter for English, Noto Kufi Arabic for Arabic -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&family=Noto+Kufi+Arabic:wght@200;300;400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            arabic: ['"Noto Kufi Arabic"', 'sans-serif'],
          },
          colors: {
            // New Palette Definition
            brand: {
              white: '#FFFFFF',
              wood: '#DCC7A1',       // Light Wood
              charcoal: '#2F2F2F',   // Main Text
              green: '#6B4423',      // Rich Wooden Brown (Primary Button/Accent)
              greenHover: '#4A2F18'  // Darker Wooden Brown for hover
            },
            zinc: {
              50: '#fafafa',
              100: '#f4f4f5',
              200: '#e4e4e7',
              300: '#d4d4d8',
              400: '#a1a1aa',
              500: '#71717a',
              600: '#52525b',
              700: '#3f3f46',
              800: '#27272a',
              900: '#18181b',
              950: '#09090b',
            },
          },
          animation: {
            'fade-up': 'fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 1.5s ease-out forwards',
            'scale-slow': 'scaleSlow 20s linear infinite alternate',
            'reveal': 'reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-in-left': 'slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-in-right': 'slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(30px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            reveal: {
              '0%': { opacity: '0', clipPath: 'inset(10% 0 10% 0)' },
              '100%': { opacity: '1', clipPath: 'inset(0 0 0 0)' },
            },
            scaleSlow: {
              '0%': { transform: 'scale(1)' },
              '100%': { transform: 'scale(1.1)' },
            },
            slideInLeft: {
              '0%': { opacity: '0', transform: 'translateX(-50px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(50px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
      }
    }
    </script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f4f4f5;
    }

    ::-webkit-scrollbar-thumb {
      background: #DCC7A1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6B4423;
    }

    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #FFFFFF;
      color: #2F2F2F;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>
